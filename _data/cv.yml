    Experience:
      - company: Learning & Adaptive Systems Group, ETH Zürich (Prof. Andreas Krause, Scott Sussex)
        position: "Research Project: Generative Antibody Design with Protein Language Models"
        location: Zürich, Switzerland
        start_date: 2026-02
        end_date: present
        highlights:
          - Turning ESM2, a masked protein language model, into a generative model for antibody design, fine-tuning on yeast-display binding data via Direct Preference Optimization (DPO) to generate higher-affinity CDR-H3 variants of the C05 broadly neutralizing anti-flu antibody.
          - Showed that evotuning (unsupervised fine-tuning on antibody sequence databases) gives a better starting point for DPO than the vanilla model, especially in the low-data regime, reaching a Spearman correlation of 0.65 between model scores and experimental binding on held-out test sets.
          - Generated novel antibody variants via both Gibbs sampling and beam search decoding; all training and inference run on the ETH Euler HPC cluster.

      - company: ETH AI Center (Apertus group)
        position: "Research Project: Training and Visualising Degeneration Apertus Probes"
        location: Zürich, Switzerland
        start_date: 2026-02
        end_date: present
        highlights:
          - Built a token-level degeneration probe on LoRA-adapted Apertus-8B-Instruct hidden states, trained on 83K labelled completions via a sliding-window repetition score, reaching 0.92 F1 (99.9% recall) at flagging degenerating tokens before generation visibly collapses; carried out in collaboration with Anna Hedström, Valentina Pyatkin, and Eduard Durech (ETH AI Center / IVIA Lab).
          - Found via PCA that LoRA adaptation makes degenerate and healthy tokens more linearly separable, and used the probe to steer generations toward safe regions and trigger early stopping during training, cutting wasted RL/SFT compute; built an interactive dashboard for diagnostics, with training and inference run on the Alps supercomputer (CSCS).

      - company: Computer Vision and Geometry Lab, ETH Zürich (Daniel Barath)
        position: "Research Project: Goal-driven 3D Map Generation with Reinforcement Learning"
        location: Zürich, Switzerland
        start_date: 2026-02
        end_date: 2026-06
        highlights:
          - Trained an RL agent using PPO to dynamically allocate resolution in a 3D map, learning to keep high detail in regions relevant to the task at hand while compressing the rest, under a tight memory budget.
          - Built a Python library for 3D maps with online adaptive resolution (incremental delta-buffer updates, raycasting-based false-obstacle pruning) and integrated it with the PEANUT navigation agent in the AI Habitat simulator, cutting memory usage by 88.6% in test episodes while maintaining task success.

